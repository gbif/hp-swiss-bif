  reverse: false
  title: "Un participant votant du GBIF de Europe"
  description: >      # required
    Statut du membre: Votant
    Participant GBIF depuis 2001
    Région GBIF: Europe
    Chef de délegation: Jérôme Frei
    Nom du nœud: GBIF Switzerland
    Noeud établi en 2004
    Site Internet: https://www.gbif.ch
    Gestionnaire du noeud participant: Sofia Wyler
  background: https://www.infofauna.ch/sites/default/files/styles/max_1300x1300/public/images/media/2026/flux-et-banques-de-donnees_info-fauna.png?itok=lVbl7fO9
