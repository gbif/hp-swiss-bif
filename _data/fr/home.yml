blank:
  klass: hero-suisse
  markdownContent: |
    <style>
      .hero-swiss-node {
        position: relative;
        margin: 0;
        min-height: 400px;
        background-image: url('{{ site.data.images.acalypha_gillespieae.src }}');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        color: white;
      }
      .hero-swiss-node .hero-content {
        width: 35%;
        min-width: 280px;
        box-sizing: border-box;
        padding: 40px;
        text-align: left;
        background: rgba(0, 0, 0, 0.45);
      }
      .hero-swiss-node h1 {
        margin: 0;
        font-size: 40px;
        font-weight: 900;
        text-transform: uppercase;
        line-height: 1.1;
      }
      .hero-swiss-node p {
        margin: 12px 0 0 0;
        font-size: 18px;
        font-weight: 400;
      }
      .hero-swiss-node .image-credit {
        position: absolute;
        bottom: 10px;
        left: 10px;
        z-index: 2;
      }
      .hero-swiss-node .image-credit .credit-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.55);
        color: white;
        font-size: 13px;
        font-weight: 700;
        font-style: italic;
        cursor: default;
      }
      .hero-swiss-node .image-credit .credit-text {
        display: none;
        position: absolute;
        bottom: 30px;
        left: 0;
        background: rgba(0, 0, 0, 0.75);
        color: white;
        font-size: 12px;
        padding: 6px 10px;
        border-radius: 4px;
        white-space: nowrap;
      }
      .hero-swiss-node .image-credit:hover .credit-text {
        display: block;
      }
    </style>
    <div class="hero-swiss-node">
      <div class="hero-content">
        <h1>Noeud Suisse de GBIF</h1>
        <p>Accédez aux données sur la biodiversité en Suisse et contribuez au réseau mondial GBIF.</p>
      </div>
      <div class="image-credit">
        <span class="credit-icon">i</span>
        <span class="credit-text">{{ site.data.images.acalypha_gillespieae.credit }}</span>
      </div>
    </div>

